<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>BreadVenture — кабинет партнёра</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="order.css">
</head>
<body>
<div class="wrap" id="wrap">
  <header>
    <img class="logo" src="logo.svg" alt="BreadVenture" onerror="var d=document.createElement('div');d.className='logo';d.textContent='B';this.replaceWith(d);">
    <div><h1 id="hTitle">Кабинет партнёра</h1><div class="tag">BreadVenture · ремесленная пекарня · Белград</div></div>
    <div class="who" id="who" style="display:none;"></div>
  </header>
  <div id="content"><div class="loading">Загрузка…</div></div>
</div>

<div class="bar" id="bar" style="display:none;">
  <div class="bar-in">
    <div class="sum"><div class="big" id="barSum">0 дин.</div><div class="sm" id="barSub">выберите позиции</div></div>
    <button class="btn" id="sendBtn" disabled>Отправить заказ</button>
  </div>
</div>


<script src="order-01-core.js"></script>
<script src="order-02-orders.js"></script>
<script src="order-03-submit-subs.js"></script>
<script src="order-04-profile.js"></script>
<script src="order-05-care-login.js"></script>

</body>
</html>
