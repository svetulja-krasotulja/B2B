<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>BreadVenture — кабинет партнёра</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F4F3E9;--blue:#47A2DA;--blue-d:#2f87bd;--dark:#1D1D1B;--muted:#8a8980;--line:#e6e4d8;--yellow:#FFE98D;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Wix Madefor Text',sans-serif;background:var(--cream);color:var(--dark);line-height:1.5;-webkit-text-size-adjust:100%;}
  .wrap{max-width:880px;margin:0 auto;padding:20px 18px 140px;}
  header{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--dark);padding:12px 0 16px;}
  .logo{width:44px;height:44px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;flex:0 0 auto;}
  img.logo{background:#fff;object-fit:contain;padding:3px;border:1px solid var(--line);}
  h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:27px;line-height:1.05;}
  .tag{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .who{margin-left:auto;text-align:right;font-size:12.5px;color:var(--muted);}
  .who a{color:var(--blue-d);cursor:pointer;text-decoration:none;}
  .lang-sw{display:inline-flex;gap:2px;border:1px solid var(--line);border-radius:8px;overflow:hidden;vertical-align:middle;}
  .lang-sw .lng{padding:2px 8px;font-size:12px;font-weight:600;color:var(--muted);background:#fff;}
  .lang-sw .lng.on{background:var(--blue);color:#fff;}
  nav{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 14px;}
  nav button{flex:0 0 auto;white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 16px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
  nav button:hover{border-color:var(--blue);color:var(--dark);}
  .cg-h{font-family:'Wix Madefor Text',sans-serif;font-weight:700;font-size:16px;letter-spacing:.01em;margin:24px 0 9px;color:var(--dark);}
  .cg-h:first-child{margin-top:6px;}
  .cg-p{font-size:14px;line-height:1.65;margin:0 0 12px;color:#33332f;}
  .cg-note{border:1px solid #ecdb94;background:#FFF7DA;color:#6b5b16;border-radius:12px;padding:12px 15px;font-size:13.5px;line-height:1.6;margin:0 0 15px;}
  .cg-tablewrap{overflow-x:auto;margin:2px 0 18px;-webkit-overflow-scrolling:touch;}
  .cg-table{border-collapse:collapse;width:100%;font-size:13px;min-width:460px;}
  .cg-table th{background:var(--blue);color:#fff;text-align:left;padding:9px 11px;font-weight:600;font-size:12.5px;}
  .cg-table td{border:1px solid var(--line);padding:9px 11px;vertical-align:top;line-height:1.5;}
  .cg-table tr:nth-child(even) td{background:#faf9f3;}
  .cg-fig{margin:0 0 14px;}
  .cg-img{max-width:100%;border-radius:12px;border:1px solid #e1ddcb;display:block;}
  .cg-cap{font-size:12.5px;color:var(--muted);margin-top:6px;}
  .cg-dl{display:inline-block;margin-top:7px;font-size:13px;font-weight:600;color:var(--blue-d);text-decoration:none;}
  .cg-file{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:11px 13px;border:1px solid #e1ddcb;border-radius:11px;margin:0 0 13px;font-size:14px;}
  .cg-fic{font-size:20px;}.cg-fname{flex:1;min-width:120px;}
  .cg-card{padding:2px 2px 20px;margin-bottom:20px;border-bottom:1px solid #d6d2bf;}
  .cg-card:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .cg-card .cg-h:first-child,.cg-card .cg-p:first-child,.cg-card .cg-note:first-child{margin-top:0;}
  .cg-card>*:last-child{margin-bottom:0;}
  .cg-foot{padding:12px 2px 0;}
  .cg-foot .cg-p{font-size:12.5px;color:var(--muted);margin:0;}
  nav button.on{background:var(--dark);color:#fff;border-color:var(--dark);}
  .note{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;font-size:13px;color:#55544c;margin:14px 0;}
  .sec-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:21px;margin:22px 0 10px;}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;gap:14px;}
  .pcard .ph{width:84px;height:84px;flex:0 0 84px;border-radius:11px;background:var(--cream);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:26px;color:#b9b6a8;overflow:hidden;}
  .pcard .ph img{width:100%;height:100%;object-fit:cover;}
  .pcard .pbody{flex:1;min-width:0;}
  .pcard .ptitle{font-weight:700;font-size:15.5px;}
  .pcard .ptitle .w{color:var(--muted);font-weight:500;font-size:13px;margin-left:7px;}
  .pcard .psost{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .pcard .pret{font-size:13px;font-weight:600;color:var(--blue-d);margin:7px 0 9px;}
  .pcard .pdesc{font-size:13px;color:#55544c;margin-top:10px;line-height:1.55;}
  table.ptiers{border-collapse:collapse;font-size:12.5px;width:100%;max-width:430px;}
  table.ptiers th,table.ptiers td{border:1px solid var(--line);padding:5px 9px;text-align:center;white-space:nowrap;}
  table.ptiers th{background:var(--cream);font-weight:600;}
  table.ptiers td:first-child,table.ptiers th:first-child{text-align:left;color:var(--muted);background:#fafaf6;}
  @media(max-width:560px){.pcard{flex-direction:column;}.pcard .ph{width:100%;height:120px;flex:none;}table.ptiers{max-width:none;}}
  .order-summary{background:var(--cream);border:1.5px solid var(--blue);border-radius:14px;padding:6px 16px;}
  .order-divider{border:none;border-top:2px solid var(--line);margin:24px 0 0;}
  .holiday-banner{background:#FFF6D6;border:1px solid #f0d97a;color:#7a5d12;border-radius:12px;padding:12px 16px;font-size:13.5px;margin:14px 0;line-height:1.5;}
  .cat{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-d);margin:18px 0 8px;}
  .row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px;}
  .row .info{flex:1;min-width:0;}
  .row .nm{font-weight:600;font-size:14.5px;}
  .row .w{color:var(--muted);font-weight:400;font-size:12.5px;margin-left:6px;}
  .row .pr{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .row .pr b{color:var(--dark);}
  .qty{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .qty button{width:32px;height:34px;border:1px solid var(--line);background:var(--cream);border-radius:9px;font-size:18px;cursor:pointer;color:var(--dark);}
  .qty input{width:52px;height:34px;text-align:center;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px;}
  .dchk{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;cursor:pointer;font-size:14px;background:#fff;user-select:none;}
  .dchk.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;}
  .qty .sqv{min-width:30px;text-align:center;font-size:15px;}
  .field{margin-bottom:13px;}
  .lbl{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px;}
  .inp{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:15px;background:#fff;}
  .inp:focus{outline:none;border-color:var(--blue);}
  textarea.inp{resize:vertical;min-height:60px;}
  .form-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;}
  .chk{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;padding:8px 0;}
  .chk .box{width:22px;height:22px;border:2px solid var(--line);border-radius:7px;flex:0 0 auto;position:relative;}
  .chk.on .box{background:var(--blue);border-color:var(--blue);}
  .chk.on .box:after{content:'✓';color:#fff;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -4px 20px rgba(0,0,0,.06);padding:12px 18px;z-index:30;}
  .bar-in{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:14px;}
  .bar .sum{flex:1;}
  .bar .sum .big{font-size:20px;font-weight:700;}
  .bar .sum .sm{font-size:12px;color:var(--muted);}
  .btn{border:none;border-radius:12px;padding:14px 22px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;background:var(--blue);color:#fff;}
  .btn:disabled{background:#c9c7bd;cursor:default;}
  .btn-line{background:#fff;border:1px solid var(--line);color:var(--dark);}
  .deliv{font-size:13px;border-radius:11px;padding:10px 13px;margin-top:12px;display:flex;gap:9px;align-items:flex-start;}
  .deliv.ok{background:#e7f5ec;color:#2c7a4b;}
  .deliv.warn{background:#fdf3e0;color:#9a6b1e;}
  .deliv.pay{background:#eef5fb;color:var(--blue-d);}
  .totals{background:var(--cream);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-top:14px;}
  .trow{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0;color:#55544c;}
  .trow.g{font-weight:700;font-size:16px;color:var(--dark);border-top:1px solid var(--line);margin-top:6px;padding-top:9px;}
  .loading,.empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:14.5px;}
  .ok-screen{text-align:center;padding:54px 20px;}
  .ok-screen .big{font-family:'Instrument Serif',serif;font-style:italic;font-size:32px;margin-bottom:12px;}
  .ok-screen .ic{font-size:46px;margin-bottom:12px;}
  .hint{font-size:12px;color:var(--muted);margin-top:4px;}
  .req{color:#d9534f;}
  .ocard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:11px;}
  .ocard .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .ocard .onum{font-weight:700;font-size:15px;}
  .ocard .odate{font-size:12.5px;color:var(--muted);}
  .ocard .oitems{font-size:13px;color:#55544c;margin-top:8px;white-space:pre-line;}
  .ocard .obottom{display:flex;align-items:center;gap:12px;margin-top:11px;flex-wrap:wrap;}
  .ocard .ototal{font-weight:700;}
  .st{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.02em;}
  .st-submitted{background:#eef5fb;color:var(--blue-d);}
  .st-confirmed{background:#e7f5ec;color:#2c7a4b;}
  .st-in_production,.st-packed{background:#fdf3e0;color:#9a6b1e;}
  .st-out_for_delivery{background:#eef5fb;color:var(--blue-d);}
  .st-delivered{background:#e7f5ec;color:#2c7a4b;}
  .st-cancelled{background:#f0efe9;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <header>
    <img class="logo" src="logo.svg" alt="BreadVenture" onerror="var d=document.createElement('div');d.className='logo';d.textContent='B';this.replaceWith(d);">
    <div><h1 id="hTitle">Кабинет партнёра</h1><div class="tag">BreadVenture · ремесленная пекарня · Белград</div></div>
    <div class="who" id="who" style="display:none;"></div>
  </header>
  <div id="content"><div class="loading">Загрузка…</div></div>
</div>

<div class="bar" id="bar" style="display:none;">
  <div class="bar-in">
    <div class="sum"><div class="big" id="barSum">0 дин.</div><div class="sm" id="barSub">выберите позиции</div></div>
    <button class="btn" id="sendBtn" disabled>Отправить заказ</button>
  </div>
</div>

<script>
/* ВСТАВЬТЕ СЮДА тот же URL веб-приложения Apps Script, что и в B2B-инструменте */
var GAS_URL='https://script.google.com/macros/s/AKfycbxec2oCFdaE1hEwCo_GGIyThwihoYk1IOChYUcxLHPqBZU4lzB_d06tav85dPFmGX1o/exec';

var PDV_DEFAULT=10, FREE_FROM=7000, MIN_DELIVERY=2500, DELIVERY=350;
var catalog=[], qtyMap={}, pickup=false, CODE='', PARTNER='', ORDERS=[], DOCS=[], TERMS=[], FOOT={}, CATSR={}, VIEW='new', openOrder='';
var SUBS=[], subQty={}, subEditId='', subDays=[];
var POINTS=[], selPoint='';
var deliveries=[], PROFILE={}, ANNOUNCE={}, STORAGE=null;
var LANG='ru';try{LANG=localStorage.getItem('bv_partner_lang')||'ru';}catch(e){}
var HOLIDAYS=[];var HOLIDAY_RAW=[];var LEAD_DAYS=2;
try{CODE=localStorage.getItem('bv_partner_code')||'';}catch(e){}

var DOC_T={invoice:'Счёт',delivery_note:'Накладная',terms:'Условия',contract:'Договор',certificate:'Сертификат',offer:'КП',other:'Документ'};
var DOC_T_SR={invoice:'Račun',delivery_note:'Otpremnica',terms:'Uslovi',contract:'Ugovor',certificate:'Sertifikat',offer:'Ponuda',other:'Dokument'};
var TL={
  ru:{neworder:'Новый заказ',myorders:'Мои заказы',docs:'Документы',info:'Условия работы',pricetab:'Прайс-лист',logout:'выйти',
    submit:'Отправить заказ',pick:'выберите позиции',pos:'поз.',repeat:'Повторить',details:'Подробнее',collapse:'Свернуть',
    deliv:'Данные доставки',contact:'Контактное лицо',phone:'Телефон',ddate:'Дата доставки',
    pickup:'Самовывоз из пекарни (без доставки)',comment:'Комментарий',dtime:'Время доставки',address:'Адрес заведения',earliest:'Ближайшая доступная дата',needdate:'Укажите дату доставки.',needaddr:'Укажите адрес заведения для доставки.',blocked:'На эту дату заказ разместить нельзя.',nearest:'Ближайшая доступная дата',sundayoff:'По воскресеньям отгрузки нет.',cutoff:'Заказ принимается не позднее чем за 2 дня до доставки (производственный цикл).',
    statusHist:'История статуса',bakeryComments:'Комментарии пекарни',yourComment:'Ваш комментарий',
    noOrders:'У вас пока нет заказов.',noDocs:'Документы появятся здесь после загрузки пекарней.',
    open:'Открыть / скачать',terms:'Условия сотрудничества',contacts:'Контакты',price:'Актуальный прайс',
    delivHint:'Не ранее чем через 48 часов. По воскресеньям отгрузки нет.'},
  sr:{neworder:'Nova porudžbina',myorders:'Moje porudžbine',docs:'Dokumenti',info:'Uslovi rada',pricetab:'Cenovnik',logout:'izlaz',
    submit:'Pošalji porudžbinu',pick:'izaberite stavke',pos:'stavki',repeat:'Ponovi',details:'Detaljnije',collapse:'Sažmi',
    deliv:'Podaci o dostavi',contact:'Kontakt osoba',phone:'Telefon',ddate:'Datum isporuke',
    pickup:'Preuzimanje u pekari (bez dostave)',comment:'Komentar',dtime:'Vreme isporuke',address:'Adresa objekta',earliest:'Najraniji dostupan datum',needdate:'Navedite datum isporuke.',needaddr:'Navedite adresu objekta za dostavu.',blocked:'Za ovaj datum nije moguće napraviti porudžbinu.',nearest:'Najraniji dostupan datum',sundayoff:'Nedeljom se ne isporučuje.',cutoff:'Porudžbina se prima najkasnije 2 dana pre isporuke (proizvodni ciklus).',
    statusHist:'Istorija statusa',bakeryComments:'Komentari pekare',yourComment:'Vaš komentar',
    noOrders:'Još nemate porudžbine.',noDocs:'Dokumenti će se pojaviti ovde nakon što ih pekara doda.',
    open:'Otvori / preuzmi',terms:'Uslovi saradnje',contacts:'Kontakt',price:'Aktuelni cenovnik',
    delivHint:'Najranije za 48 sati. Nedeljom se ne isporučuje.'}
};
function L(k){return (TL[LANG]&&TL[LANG][k])||TL.ru[k]||k;}
var ST_SR={submitted:'Nova',confirmed:'Potvrđena',in_production:'U pripremi',packed:'Spakovana',out_for_delivery:'U dostavi',delivered:'Isporučena',cancelled:'Otkazana'};
function stName(s){return LANG==='sr'?(ST_SR[s]||s):(ST[s]||s);}
function catName(cat){return (LANG==='sr'&&CATSR[cat])?CATSR[cat]:cat;}
function docType(t){return LANG==='sr'?(DOC_T_SR[t]||t):(DOC_T[t]||t);}
function ORD_DOC_SR(t){var ru={predracun:'Предсчёт (predračun)',otpremnica:'Отпремница',invoice:'Счёт',other:'Документ'};var sr={predracun:'Predračun',otpremnica:'Otpremnica',invoice:'Račun',other:'Dokument'};return LANG==='sr'?(sr[t]||t):(ru[t]||t);}

var ST={submitted:'Новый',confirmed:'Подтверждён',in_production:'В производстве',packed:'Собран',out_for_delivery:'В доставке',delivered:'Доставлен',cancelled:'Отменён'};

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function fmt(n){return (Math.round(n*100)/100).toLocaleString('ru-RU',{maximumFractionDigits:2});}
function itemPdv(it){var v=(it&&it.pdv!=null&&it.pdv!=='')?Number(it.pdv):PDV_DEFAULT;return isNaN(v)?PDV_DEFAULT:v;}
function itemUnit(it){return (it&&it.uom)?it.uom:'шт';}
function uName(u){if(LANG!=='sr')return u||'шт';return ({'шт':'kom','кг':'kg','г':'g','мл':'ml','л':'l'})[u]||u;}
function cur(){return LANG==='sr'?'din.':'дин.';}
function ymd(d){var m=(''+(d.getMonth()+1)).padStart(2,'0'),dd=(''+d.getDate()).padStart(2,'0');return d.getFullYear()+'-'+m+'-'+dd;}
function fmtDate(d){return (''+d.getDate()).padStart(2,'0')+'.'+(''+(d.getMonth()+1)).padStart(2,'0')+'.'+d.getFullYear();}
function isSunday(d){return d.getDay()===0;}
function isHoliday(d){return HOLIDAYS.indexOf(ymd(d))>=0;}
function earliestDate(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+LEAD_DAYS);return d;}
function isBlockedDate(d){if(d<earliestDate())return true;if(isSunday(d))return true;if(isHoliday(d))return true;return false;}
function nextAvailable(){var d=earliestDate(),g=0;while(isBlockedDate(d)&&g<120){d.setDate(d.getDate()+1);g++;}return d;}
var HOL_LBL={weekend:{ru:'выходные',sr:'neradni dani'},holiday:{ru:'праздничные выходные',sr:'praznični dani'},maintenance:{ru:'технические работы',sr:'tehnički radovi'}};
function holRawType(y){for(var i=0;i<HOLIDAY_RAW.length;i++){var h=HOLIDAY_RAW[i];var d=(typeof h==='string')?h:(h&&h.date);if(d===y)return (typeof h==='string')?'holiday':((h&&h.type)||'holiday');}return 'holiday';}
function timeSlotOptions(sel){var o='<option value="">'+(LANG==='sr'?'— vreme —':'— время —')+'</option>';for(var hh=8;hh<=16;hh++){var t=(hh<10?'0':'')+hh+':00';o+='<option value="'+t+'"'+(sel===t?' selected':'')+'>'+t+'</option>';}return o;}
function holidayBannerHtml(){
  if(!HOLIDAYS.length)return '';
  var today=new Date();today.setHours(0,0,0,0);
  var fut=HOLIDAYS.filter(function(y){return new Date(y+'T00:00:00')>=today;}).sort();
  if(!fut.length)return '';
  var ranges=[],cur=[fut[0]];
  for(var i=1;i<fut.length;i++){var p=new Date(fut[i-1]+'T00:00:00'),n=new Date(fut[i]+'T00:00:00');if((n-p)===86400000)cur.push(fut[i]);else{ranges.push(cur);cur=[fut[i]];}}
  ranges.push(cur);
  function f(y){var d=new Date(y+'T00:00:00');return (''+d.getDate()).padStart(2,'0')+'.'+(''+(d.getMonth()+1)).padStart(2,'0')+'.'+d.getFullYear();}
  var sr=(LANG==='sr'),lines=[];
  ranges.forEach(function(r){
    var startD=new Date(r[0]+'T00:00:00'),daysLeft=Math.round((startD-today)/86400000);
    if(daysLeft>14)return;
    var tp=holRawType(r[0]),tn=(HOL_LBL[tp]?HOL_LBL[tp][sr?'sr':'ru']:(sr?'neradni dani':'нерабочие дни'));
    if(r.length===1)lines.push(f(r[0])+' — '+tn);
    else lines.push((sr?'od ':'с ')+f(r[0])+(sr?' do ':' по ')+f(r[r.length-1])+' — '+tn);
  });
  if(!lines.length)return '';
  var head=sr?'Obratite pažnju na neradne dane (uzmite u obzir pri planiranju):':'Обратите внимание на нерабочие дни (учитывайте при планировании):';
  return '<div class="holiday-banner">📅 '+head+'<br>'+lines.join('<br>')+'</div>';
}
function pdvName(){return 'PDV';}
function nextTierHint(it,q){
  if(!it||!it.tiers||!it.tiers.length||q<=0)return '';
  var cd=discountFor(it,q);
  var sorted=it.tiers.slice().sort(function(a,b){return a.min-b.min;});
  var nxt=null;for(var i=0;i<sorted.length;i++){if(sorted[i].min>q&&(Number(sorted[i].disc)||0)>cd){nxt=sorted[i];break;}}
  if(!nxt)return cd>0?(LANG==='sr'?'maksimalan popust −'+fmt(cd)+'%':'макс. скидка −'+fmt(cd)+'%'):'';
  var need=nxt.min-q,uu=uName(itemUnit(it)),dd=fmt(Number(nxt.disc)||0);
  return LANG==='sr'?('još '+need+' '+uu+' do popusta −'+dd+'%'):('ещё '+need+' '+uu+' до скидки −'+dd+'%');
}
function discountFor(it,qty){if(!it||!it.tiers||!it.tiers.length)return 0;var d=0,best=-1;
  it.tiers.forEach(function(t){if(qty>=t.min&&t.min>best){best=t.min;d=Number(t.disc)||0;}});return d;}
function minB2BLocal(it){if(!it||!it.tiers||!it.tiers.length)return it.retail;var md=0;it.tiers.forEach(function(t){var d=Number(t.disc)||0;if(d>md)md=d;});return it.retail*(1-md/100);}
function deliveryInfo(net){if(pickup)return {cost:0,mode:'pickup'};
  if(net<MIN_DELIVERY)return {cost:0,mode:'need'};
  if(net>=FREE_FROM)return {cost:0,mode:'free'};
  return {cost:DELIVERY,mode:'paid'};}
function catList(){var seen={},arr=[];catalog.forEach(function(it){var c=it.cat||'Без категории';if(!seen[c]){seen[c]=1;arr.push(c);}});return arr;}
function itemByNameWeight(name,weight){var r=null;catalog.forEach(function(it){if(it.name===name&&(it.weight||'')===(weight||''))r=it;});return r;}

function compute(){
  var gross=0,base=0,pdvByRate={},cnt=0;
  catalog.forEach(function(it){var q=Math.max(0,Number(qtyMap[it.id])||0);if(!q)return;cnt++;
    var disc=discountFor(it,q);var g=it.retail*(1-disc/100)*q;var rate=itemPdv(it);
    base+=it.retail*q;gross+=g;var pv=g-g/(1+rate/100);pdvByRate[rate]=(pdvByRate[rate]||0)+pv;});
  var pdv=0;for(var k in pdvByRate)pdv+=pdvByRate[k];
  var net=gross-pdv,di=deliveryInfo(net);
  return {base:base,gross:gross,net:net,pdv:pdv,pdvByRate:pdvByRate,save:base-gross,
          delivery:di.cost,mode:di.mode,grand:gross+di.cost,count:cnt};
}

function pointById(id){for(var i=0;i<POINTS.length;i++)if(POINTS[i].id===id)return POINTS[i];return null;}
function currentItems(){var items=[];catalog.forEach(function(it){var q=Math.max(0,Number(qtyMap[it.id])||0);if(!q)return;
    var disc=discountFor(it,q),unit=it.retail*(1-disc/100);
    items.push({name:it.name,weight:it.weight,qty:q,uom:itemUnit(it),sum:Math.round(unit*q*100)/100});});return items;}
function getDeliveryFields(){
  var contact=document.getElementById('fContact').value.trim();
  var phone=document.getElementById('fPhone').value.trim();
  if(!contact||!phone){alert(LANG==='sr'?'Popunite kontakt osobu i telefon.':'Заполните контактное лицо и телефон.');return null;}
  var pt=(selPoint&&selPoint!=='__new')?pointById(selPoint):null;
  var faEl=document.getElementById('fAddr');
  var addr=pt?((pt.name?pt.name+', ':'')+pt.address):(faEl?faEl.value.trim():'');
  try{localStorage.setItem('bv_p_contact',contact);localStorage.setItem('bv_p_phone',phone);localStorage.setItem('bv_p_addr',addr);}catch(e){}
  var c=compute();
  if(c.mode!=='need'&&c.mode!=='pickup'&&!addr){alert(L('needaddr'));return null;}
  var date=document.getElementById('fDate').value;
  if(!date){alert(L('needdate'));return null;}
  var dd=new Date(date+'T00:00:00');
  if(isBlockedDate(dd)){var na=nextAvailable();
    var why=isSunday(dd)?L('sundayoff'):(isHoliday(dd)?(LANG==='sr'?'Taj dan je neradni.':'Этот день нерабочий.'):L('cutoff'));
    alert(L('blocked')+' '+why+'\n\n'+L('nearest')+': '+fmtDate(na));
    document.getElementById('fDate').value=ymd(na);return null;}
  var time=document.getElementById('fTime').value;
  var comment=document.getElementById('fComment').value.trim();
  if(c.mode==='need'||c.mode==='pickup')comment=(comment?comment+' · ':'')+'Самовывоз';
  return {contact:contact,phone:phone,addr:addr,time:time||'',
    date:date?new Date(date).toLocaleDateString('ru-RU'):'не указана',comment:comment,
    items:currentItems(),total:Math.round(c.grand*100)/100};
}

function sendOrder(){
  var c=compute();
  if(c.count<1&&!deliveries.length)return;
  var contact=document.getElementById('fContact').value.trim();
  var phone=document.getElementById('fPhone').value.trim();
  if(!contact||!phone){alert(LANG==='sr'?'Popunite kontakt osobu i telefon.':'Заполните контактное лицо и телефон.');return;}
  var ordersArr=[];
  deliveries.forEach(function(d){ordersArr.push({contact:contact,phone:phone,address:d.address,time:d.time,date:d.date,comment:d.comment,items:d.items,total:d.total});});
  if(c.count>0){
    var f=getDeliveryFields();if(!f)return;
    ordersArr.push({contact:contact,phone:phone,address:f.addr,time:f.time,date:f.date,comment:f.comment,items:f.items,total:f.total});
  }
  if(!ordersArr.length){alert(LANG==='sr'?'Dodajte stavke.':'Добавьте позиции.');return;}
  var btn=document.getElementById('sendBtn');btn.disabled=true;btn.textContent=(LANG==='sr'?'Šaljemo…':'Отправляем…');
  var body=(ordersArr.length===1)?{order:ordersArr[0],code:CODE}:{orderBatch:ordersArr,code:CODE};
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(j){if(j&&j.ok){qtyMap={};deliveries=[];refreshOrders(function(){showOk(j.order_id||(j.order_ids&&j.order_ids.join(', '))||'');});}else throw 'err';})
    .catch(function(){alert(LANG==='sr'?'Nije moguće poslati porudžbinu. Pokušajte ponovo.':'Не удалось отправить заказ. Проверьте интернет и попробуйте ещё раз.');btn.disabled=false;btn.textContent=L('submit');});
}

function dowName(n){var ru=['','Пн','Вт','Ср','Чт','Пт','Сб','Вс'],sr=['','Pon','Uto','Sre','Čet','Pet','Sub','Ned'];return (LANG==='sr'?sr:ru)[n]||'';}
function toast2(m){var d=document.createElement('div');d.textContent=m;d.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1D1D1B;color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.25);';document.body.appendChild(d);setTimeout(function(){d.style.transition='opacity .4s';d.style.opacity='0';setTimeout(function(){d.remove();},400);},1900);}
function subNextDates(sub,limit){
  var res=[],d=earliestDate(),end=new Date();end.setHours(0,0,0,0);end.setDate(end.getDate()+14);
  var conf=sub.confirmed||{};
  while(d<=end){var dow=d.getDay()===0?7:d.getDay(),key=ymd(d);
    if((sub.days||[]).indexOf(dow)>=0 && !isSunday(d) && !isHoliday(d) && !conf[key]){res.push(key);if(res.length>=limit)break;}
    d.setDate(d.getDate()+1);}
  return res;
}
function pendingList(){var out=[];SUBS.forEach(function(sub){if(!sub.active)return;var nx=subNextDates(sub,1);if(nx.length)out.push({sub:sub,date:nx[0]});});return out;}
function pendingCount(){try{return pendingList().length;}catch(e){return 0;}}
function cloudSubList(cb){
  if(!CODE){if(cb)cb();return;}
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({subList:CODE})})

    .catch(function(){if(cb)cb();});
}
function subItemsForSend(sub){
  var saved=qtyMap;qtyMap={};
  (sub.items||[]).forEach(function(si){var it=itemByIdLocal(si.id)||itemByNameWeight(si.name,si.weight);if(it)qtyMap[it.id]=Math.max(0,Number(si.qty)||0);});
  var c=compute(),items=[];
  catalog.forEach(function(it){var q=Math.max(0,Number(qtyMap[it.id])||0);if(!q)return;var disc=discountFor(it,q),unit=it.retail*(1-disc/100);items.push({name:it.name,weight:it.weight,qty:q,uom:itemUnit(it),sum:Math.round(unit*q*100)/100});});
  var total=Math.round(c.grand*100)/100;qtyMap=saved;
  return {items:items,total:total};
}
function confirmDelivery(subId,dateKey,action){
  if(window._subBusy)return;
  var sub=null;SUBS.forEach(function(x){if(x.id===subId)sub=x;});if(!sub)return;
  var body={subId:subId,date:dateKey,code:CODE,action:action};
  if(action==='order'){var built=subItemsForSend(sub);
    if(!built.items.length){alert(LANG==='sr'?'Pozicije iz pretplate trenutno nisu dostupne.':'Позиции из подписки сейчас недоступны.');return;}
    var dd=new Date(dateKey+'T00:00:00');
    body.order={contact:sub.contact||localStorage.getItem('bv_p_contact')||'',phone:sub.phone||localStorage.getItem('bv_p_phone')||'',
      address:sub.address||'',time:sub.time||'',date:dd.toLocaleDateString('ru-RU'),
      comment:(LANG==='sr'?'Redovna isporuka':'Регулярная поставка'),items:built.items,total:built.total};
  }
  window._subBusy=true;
  document.querySelectorAll('.pd-ok,.pd-skip,.pd-ed').forEach(function(b){b.disabled=true;b.style.opacity='.6';});
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})
    .then(function(r){return r.json();}).then(function(j){window._subBusy=false;if(j&&j.ok){if(Array.isArray(j.subscriptions))SUBS=j.subscriptions;
      var msg=j.already?(LANG==='sr'?'Već je obrađeno':'Уже обработано'):(action==='order'?(LANG==='sr'?'Isporuka potvrđena':'Поставка подтверждена'):(LANG==='sr'?'Isporuka preskočena':'Поставка пропущена'));
      if(action==='order'&&!j.already)refreshOrders(function(){renderSubs();toast2(msg);});
      else{renderSubs();toast2(msg);}
    }else{alert(LANG==='sr'?'Nije uspelo':'Не удалось');renderSubs();}}).catch(function(){window._subBusy=false;alert(LANG==='sr'?'Greška veze':'Ошибка соединения');renderSubs();});
}

  }
  h+='<div class="cat">'+(LANG==='sr'?'Moje redovne isporuke':'Мои регулярные поставки')+'</div>';

function saveSub(){

  POINTS.forEach(function(pt){

       '<div style="font-size:13.5px;color:#55544c;margin-top:3px;">'+esc(pt.address||'')+'</div>'+
       '<div style="display:flex;gap:7px;margin-top:10px;">'+
       '<button class="btn btn-line pt-ed" data-id="'+esc(pt.id)+'" style="padding:8px 14px;font-size:13px;">'+(sr?'Izmeni':'Изменить')+'</button>'+
       '<button class="btn btn-line pt-del" data-id="'+esc(pt.id)+'" style="padding:8px 14px;font-size:13px;color:#b3261e;">'+(sr?'Obriši':'Удалить')+'</button>'+
       '</div></div>';
  });
  h+='<button class="btn" id="ptNew" style="margin-top:6px;">+ '+(sr?'Nova adresa':'Новый адрес')+'</button>';
  c.innerHTML=h;bindNav();
  document.getElementById('meSave').addEventListener('click',saveMe);
  c.querySelectorAll('.pt-ed').forEach(function(b){b.addEventListener('click',function(){openPointForm(this.dataset.id);});});
  c.querySelectorAll('.pt-del').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.id;if(confirm(sr?'Obrisati ovu adresu?':'Удалить этот адрес?'))cloudPointDelete(id);});});
  var nb=document.getElementById('ptNew');if(nb)nb.addEventListener('click',function(){openPointForm('');});
}
function saveMe(){
  function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}
  var prof={company:gv('meCompany'),contact:gv('meContact'),phone:gv('mePhone'),pib:gv('mePib'),maticni:gv('meMaticni'),account:gv('meAccount')};
  var btn=document.getElementById('meSave');btn.disabled=true;btn.textContent='…';
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({profileSave:prof,code:CODE})})
    .then(function(r){return r.json();}).then(function(j){
      if(j&&j.ok){PROFILE=j.profile||prof;toast2(LANG==='sr'?'Sačuvano':'Сохранено');btn.disabled=false;btn.textContent=(LANG==='sr'?'Sačuvaj':'Сохранить');}
      else{alert(LANG==='sr'?'Nije uspelo':'Не удалось');btn.disabled=false;btn.textContent=(LANG==='sr'?'Sačuvaj':'Сохранить');}
    }).catch(function(){alert(LANG==='sr'?'Greška':'Ошибка');btn.disabled=false;btn.textContent=(LANG==='sr'?'Sačuvaj':'Сохранить');});
}

/* ---------- хранение и рекомендации (только просмотр) ---------- */
var CARE_COLORS={
  yellow:{bg:'#FFF7DA',bd:'#ecdb94',fg:'#6b5b16'},
  red:{bg:'#FCEBEA',bd:'#f0b3ad',fg:'#962f26'},
  blue:{bg:'#E8F4FC',bd:'#9fcdeb',fg:'#175680'},
  green:{bg:'#EAF6EE',bd:'#a6d8bb',fg:'#1d6840'},
  grey:{bg:'#F0F0EA',bd:'#dcdad0',fg:'#45443e'}
};
function driveThumb(id){return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1000';}
function driveDl(id){return 'https://drive.google.com/uc?export=download&id='+id;}
function careBlocksHtml(blocks,lang){
  if(!blocks||!blocks.length)return '';
  function tx(b){return (b.t&&b.t[lang])||'';}
  function nl(s){return s.replace(/\n/g,'<br>');}
  function cell(b){
    if(b.type==='h')return '<h3 class="cg-h">'+esc(tx(b))+'</h3>';
    if(b.type==='note'){var c=CARE_COLORS[b.color||'yellow']||CARE_COLORS.yellow;return '<div class="cg-note" style="background:'+c.bg+';border-color:'+c.bd+';color:'+c.fg+';">'+nl(esc(tx(b)))+'</div>';}
    if(b.type==='table'){var t=(b.t&&b.t[lang])||[];if(!t.length)return '';var s='<div class="cg-tablewrap"><table class="cg-table">';t.forEach(function(row,ri){s+='<tr>';row.forEach(function(cl){var tag=ri===0?'th':'td';s+='<'+tag+'>'+nl(esc(cl||''))+'</'+tag+'>';});s+='</tr>';});return s+'</table></div>';}
    if(b.type==='img'){var src=b.fileId?driveThumb(b.fileId):(b.thumb||'');var dl=b.fileId?driveDl(b.fileId):(b.download||'');var cap=(b.cap&&b.cap[lang])||'';
      return '<figure class="cg-fig">'+(src?'<img class="cg-img" src="'+esc(src)+'" alt="" loading="lazy">':'')+
        (cap?'<figcaption class="cg-cap">'+nl(esc(cap))+'</figcaption>':'')+
        (dl?'<a class="cg-dl" href="'+esc(dl)+'" rel="noopener">⬇ '+(lang==='sr'?'Preuzmi sliku':'Скачать фото')+'</a>':'')+'</figure>';}
    if(b.type==='file'){var fdl=b.fileId?driveDl(b.fileId):(b.download||'');var ttl=(b.ttl&&b.ttl[lang])||b.name||(lang==='sr'?'Dokument':'Документ');
      return '<div class="cg-file"><span class="cg-fic">📄</span><span class="cg-fname">'+esc(ttl)+'</span>'+(fdl?'<a class="cg-dl" href="'+esc(fdl)+'" rel="noopener">⬇ '+(lang==='sr'?'Preuzmi':'Скачать')+'</a>':'')+'</div>';}
    return '<p class="cg-p">'+nl(esc(tx(b)))+'</p>';
  }
  var secs=[],cur=null;
  blocks.forEach(function(b){if(b.type==='h'){cur={blocks:[b]};secs.push(cur);}else{if(!cur){cur={blocks:[]};secs.push(cur);}cur.blocks.push(b);}});
  if(secs.length){var L=secs[secs.length-1];if(L.blocks.length>1){var lastb=L.blocks[L.blocks.length-1];if(lastb.type==='p'){L.blocks.pop();secs.push({blocks:[lastb],footer:true});}}}
  var h='';
  secs.forEach(function(s){var inner='';s.blocks.forEach(function(b){inner+=cell(b);});h+='<div class="cg-card'+(s.footer?' cg-foot':'')+'">'+inner+'</div>';});
  return h;
}
function renderStorage(){
  var sr=(LANG==='sr');
  document.getElementById('hTitle').textContent=(sr?'Čuvanje i preporuke':'Хранение и рекомендации');
  document.getElementById('bar').style.display='none';
  var c=document.getElementById('content');var h=navHtml('care');
  h+='<div class="sec-title" style="font-size:23px;">'+(sr?'Čuvanje i preporuke za upotrebu':'Хранение и рекомендации по использованию')+'</div>';
  var blocks=(STORAGE&&STORAGE.blocks)||[];
  if(blocks.length)h+=careBlocksHtml(blocks,LANG);
  else h+='<p class="hint" style="margin-top:10px;">'+(sr?'Sekcija će uskoro biti popunjena.':'Раздел скоро будет заполнен.')+'</p>';
  c.innerHTML=h;bindNav();
}

/* ---------- вход по коду ---------- */
function showLogin(err){
  document.getElementById('hTitle').textContent=(LANG==='sr'?'Kabinet partnera':'Кабинет партнёра');
  document.getElementById('content').innerHTML=
    '<div class="form-card" style="max-width:420px;margin:28px auto;">'+
    '<div class="sec-title" style="margin-top:0;">Вход для партнёров</div>'+
    '<p class="hint" style="margin-bottom:14px;">Введите код доступа, который вам выдали в пекарне.</p>'+
    '<div class="field"><input class="inp" id="codeInp" placeholder="Код доступа" style="text-transform:uppercase;letter-spacing:.1em;font-size:18px;text-align:center;" value="'+esc(CODE)+'"></div>'+
    (err?'<div class="deliv warn" style="margin-bottom:12px;"><span>⚠</span><div>'+esc(err)+'</div></div>':'')+
    '<button class="btn" id="loginBtn" style="width:100%;">Войти</button>'+
    '<p class="hint" style="text-align:center;margin-top:16px;">Нет кода? <a href="#" id="reqLink" style="color:var(--blue-d);">Запросить доступ</a></p></div>';
  document.getElementById('loginBtn').addEventListener('click',doAuth);
  document.getElementById('codeInp').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
  document.getElementById('reqLink').addEventListener('click',function(e){e.preventDefault();showRequest();});
}
function applyAuth(j,code){
  CODE=code;PARTNER=(j.partner&&j.partner.name)||'';
  try{localStorage.setItem('bv_partner_code',code);}catch(e){}
  var data=j.data||{};catalog=(data.catalog||[]).filter(function(it){return it&&it.name&&it.retail!=null;});
  ORDERS=j.orders||[];DOCS=j.documents||[];POINTS=j.points||[];PROFILE=j.profile||{};ANNOUNCE=(data.announce)||{};STORAGE=(data.storage)||null;deliveries=[];
  TERMS=Array.isArray(data.terms)?data.terms:[];FOOT=data.foot||{};CATSR=data.catNamesSr||{};
  if(data.settings){var s=data.settings;if(s.free!=null)FREE_FROM=Number(s.free)||FREE_FROM;if(s.minDeliv!=null)MIN_DELIVERY=Number(s.minDeliv)||MIN_DELIVERY;if(s.deliv!=null)DELIVERY=Number(s.deliv)||DELIVERY;if(Array.isArray(s.holidays)){HOLIDAY_RAW=s.holidays;HOLIDAYS=s.holidays.map(function(h){return typeof h==='string'?h:(h&&h.date)||'';}).filter(Boolean);}if(s.leadDays!=null)LEAD_DAYS=Number(s.leadDays)||LEAD_DAYS;}
  setView('new');
  cloudSubList();
  cloudPointList();
}
function doAuth(){
  var code=document.getElementById('codeInp').value.trim().toUpperCase();if(!code){showLogin('Введите код.');return;}
  var btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Проверяем…';
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({auth:code})})
    .then(function(r){return r.json();})
    .then(function(j){if(j&&j.ok)applyAuth(j,code);else showLogin('Неверный или отключённый код. Проверьте или запросите доступ.');})
    .catch(function(){showLogin('Нет связи. Попробуйте позже.');});
}
function showRequest(){
  document.getElementById('bar').style.display='none';
  document.getElementById('content').innerHTML=
    '<div class="form-card" style="max-width:440px;margin:28px auto;">'+
    '<div class="sec-title" style="margin-top:0;">Запрос доступа</div>'+
    '<p class="hint" style="margin-bottom:14px;">Оставьте контакты — пекарня свяжется и выдаст код доступа к прайсу.</p>'+
    '<div class="field"><label class="lbl">Компания <span class="req">*</span></label><input class="inp" id="rName" placeholder="Название заведения"></div>'+
    '<div class="field"><label class="lbl">Контактное лицо <span class="req">*</span></label><input class="inp" id="rContact" placeholder="Имя"></div>'+
    '<div class="field"><label class="lbl">Телефон <span class="req">*</span></label><input class="inp" id="rPhone" placeholder="+381 …" inputmode="tel"></div>'+
    '<div class="field"><label class="lbl">Комментарий</label><textarea class="inp" id="rComment" placeholder="Что планируете заказывать"></textarea></div>'+
    '<button class="btn" id="reqBtn" style="width:100%;">Отправить запрос</button>'+
    '<p class="hint" style="text-align:center;margin-top:14px;"><a href="#" id="backLink" style="color:var(--blue-d);">← у меня уже есть код</a></p></div>';
  document.getElementById('backLink').addEventListener('click',function(e){e.preventDefault();showLogin();});
  document.getElementById('reqBtn').addEventListener('click',function(){
    var name=document.getElementById('rName').value.trim(),contact=document.getElementById('rContact').value.trim(),phone=document.getElementById('rPhone').value.trim();
    if(!name||!contact||!phone){alert('Заполните компанию, контактное лицо и телефон.');return;}
    var comment=document.getElementById('rComment').value.trim();var btn=this;btn.disabled=true;btn.textContent='Отправляем…';
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({request:{name:name,contact:contact,phone:phone,comment:comment}})})
      .then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok)document.getElementById('content').innerHTML='<div class="ok-screen"><div class="ic">🔑</div><div class="big">Запрос отправлен</div><p style="color:#55544c;max-width:420px;margin:0 auto;">Спасибо! Пекарня свяжется с вами и выдаст код доступа.</p><button class="btn" style="margin-top:22px;" onclick="location.reload()">На главную</button></div>';
        else throw 'err';
      }).catch(function(){alert('Не удалось отправить. Попробуйте позже.');btn.disabled=false;btn.textContent='Отправить запрос';});
  });
}

/* ---------- старт ---------- */
(function(){
  if(!GAS_URL){document.getElementById('content').innerHTML='<div class="empty">Страница ещё не подключена к пекарне.<br>Вставьте URL в переменную GAS_URL.</div>';return;}
  if(CODE){
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({auth:CODE})})
      .then(function(r){return r.json();})
      .then(function(j){if(j&&j.ok)applyAuth(j,CODE);else{try{localStorage.removeItem('bv_partner_code');}catch(e){}CODE='';showLogin();}})
      .catch(function(){showLogin('Нет связи. Попробуйте позже.');});
  }else showLogin();
})();
</script>
